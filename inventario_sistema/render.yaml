services:
  - type: web
    name: comedor-alexandra
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "False"
      - key: SECRET_KEY
        sync: false
      - key: MYSQL_HOST
        value: trolley.proxy.rlwy.net
      - key: MYSQL_PORT
        value: "14574"
      - key: MYSQL_USER
        value: root
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DATABASE
        value: railway
      - key: DATABASE_URL
        value: sqlite:///inventario.db
