<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Plato - Restaurante La Buena Mesa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #e0f7fa 0%, #fce4ec 100%); }
        .hero { background: linear-gradient(135deg, #65138b 0%, #b92580 100%); color: white; padding: 40px 0; text-align: center; }
        .nav-link { color: white !important; margin: 0 10px; }
        .nav-link:hover { color: #00bcd4 !important; }
    </style>
</head>
<body>
    <div class="hero">
        <div class="container">
            <h1>➕ Agregar Nuevo Plato</h1>
            <p>Expande nuestro menú con deliciosas opciones</p>
            <nav class="mt-3">
                <a href="index.html" class="nav-link">Inicio</a> |
                <a href="dashboard.html" class="nav-link">Dashboard</a> |
                <a href="menu.html" class="nav-link">Menú</a> |
                <a href="reservas.html" class="nav-link">Reservas</a>
            </nav>
        </div>
    </div>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h2 class="mb-0">➕ Agregar Nuevo Plato</h2>
                    </div>
                    <div class="card-body">
                        <form>
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre del Plato</label>
                                <input type="text" class="form-control" id="nombre" required placeholder="Ej: Ceviche de Camarón">
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="cantidad" class="form-label">Cantidad Disponible</label>
                                    <input type="number" class="form-control" id="cantidad" min="0" required placeholder="0">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="precio" class="form-label">Precio Unitario ($)</label>
                                    <input type="number" class="form-control" id="precio" min="0" step="0.01" required placeholder="0.00">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="categoria" class="form-label">Categoría</label>
                                <select class="form-control" id="categoria" required>
                                    <option value="">Seleccionar categoría</option>
                                    <option value="Mariscos">Mariscos</option>
                                    <option value="Carnes">Carnes</option>
                                    <option value="Sopas">Sopas</option>
                                    <option value="Ensaladas">Ensaladas</option>
                                    <option value="Postres">Postres</option>
                                    <option value="Bebidas">Bebidas</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="descripcion" class="form-label">Descripción</label>
                                <textarea class="form-control" id="descripcion" rows="3" placeholder="Describe los ingredientes y preparación del plato..."></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="imagen" class="form-label">URL de la Imagen</label>
                                <input type="url" class="form-control" id="imagen" placeholder="https://ejemplo.com/imagen-del-plato.jpg">
                                <div class="form-text">Opcional: Ingresa la URL de una imagen atractiva del plato</div>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <button type="submit" class="btn btn-success">Agregar Plato</button>
                                <a href="menu.html" class="btn btn-secondary">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
