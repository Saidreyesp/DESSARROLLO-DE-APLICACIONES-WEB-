{% extends "base.html" %}

{% block title %}Registro - {{ negocio_name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card p-4">
            <h2 class="mb-3" style="color:#C9A227; font-family:'Cormorant Garamond', Georgia, serif;">Crear Cuenta</h2>
            <p class="mb-4" style="color:#d8d1c7;">Registra un usuario para acceder a las funciones protegidas del sistema.</p>

            <form method="POST" action="{{ url_for('registro') }}">
                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre</label>
                    <input type="text" class="form-control" id="nombre" name="nombre" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Contrasena</label>
                    <input type="password" class="form-control" id="password" name="password" minlength="6" required>
                    <small class="text-muted">Minimo 6 caracteres</small>
                </div>
                <button type="submit" class="btn btn-primary w-100">Registrar Usuario</button>
            </form>

            <hr>
            <p class="mb-0">Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesion</a></p>
        </div>
    </div>
</div>
{% endblock %}
