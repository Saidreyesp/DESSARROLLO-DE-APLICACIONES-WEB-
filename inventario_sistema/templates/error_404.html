{% extends "base.html" %}

{% block title %}404 - Pagina no encontrada{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card p-4 text-center">
            <h2 style="color:#C9A227;">404</h2>
            <p class="mb-2">La pagina solicitada no existe o ya no esta disponible.</p>
            <p style="color:#d8d1c7;">Verifica la ruta o vuelve al menu principal.</p>
            <div class="mt-3 d-flex gap-2 justify-content-center">
                <a href="{{ url_for('index') }}" class="btn btn-primary">Ir al inicio</a>
                <a href="{{ url_for('productos') }}" class="btn btn-secondary">Ir al menu</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
