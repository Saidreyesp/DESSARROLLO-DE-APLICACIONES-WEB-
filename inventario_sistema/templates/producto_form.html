{% extends "base.html" %}

{% block title %}{{ 'Editar' if es_edicion else 'Nuevo' }} Plato{% endblock %}

{% block content %}
<div class="card p-4" style="max-width: 760px; margin: 0 auto;">
  <h2 class="mb-3">{{ 'Editar Plato' if es_edicion else 'Agregar Nuevo Plato' }}</h2>

  <form method="post" class="row g-3">
    <div class="col-12">
      <label for="nombre" class="form-label">Nombre del Producto</label>
      <input type="text" class="form-control" id="nombre" name="nombre" required
             value="{{ producto.nombre if producto and producto.nombre is defined else '' }}">
    </div>

    <div class="col-md-4">
      <label for="cantidad" class="form-label">Cantidad</label>
      <input type="number" class="form-control" id="cantidad" name="cantidad" min="0" required
             value="{{ producto.cantidad if producto and producto.cantidad is defined else 0 }}">
    </div>

    <div class="col-md-4">
      <label for="precio" class="form-label">Precio Unitario</label>
      <input type="number" class="form-control" id="precio" name="precio" min="0" step="0.01" required
             value="{{ producto.precio if producto and producto.precio is defined else 0 }}">
    </div>

    <div class="col-md-4">
      <label for="categoria" class="form-label">Categoria</label>
      <input type="text" class="form-control" id="categoria" name="categoria"
             value="{{ producto.categoria if producto and producto.categoria is defined else '' }}">
    </div>

    <div class="col-12">
      <label for="descripcion" class="form-label">Descripcion</label>
      <textarea id="descripcion" name="descripcion" rows="4" class="form-control">{{ producto.descripcion if producto and producto.descripcion is defined else '' }}</textarea>
    </div>

    <div class="col-12">
      <label for="imagen" class="form-label">URL de Imagen</label>
      <input type="url" class="form-control" id="imagen" name="imagen" placeholder="https://ejemplo.com/imagen.jpg"
             value="{{ producto.imagen if producto and producto.imagen is defined else '' }}">
    </div>

    <div class="col-12 d-flex gap-2">
      <button type="submit" class="btn btn-primary">Guardar Producto</button>
      <a class="btn btn-secondary" href="{{ url_for('productos') }}">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
