{% extends "base.html" %}

{% block title %}Nuevo Plato - Restaurante La Buena Mesa{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h2 class="mb-0">➕ Agregar Nuevo Plato</h2>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre del Plato</label>
                        <input type="text" class="form-control" id="nombre" name="nombre" required placeholder="Ej: Ceviche de Camarón">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="cantidad" class="form-label">Cantidad Disponible</label>
                            <input type="number" class="form-control" id="cantidad" name="cantidad" min="0" required placeholder="0">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="precio" class="form-label">Precio Unitario ($)</label>
                            <input type="number" class="form-control" id="precio" name="precio" min="0" step="0.01" required placeholder="0.00">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="categoria" class="form-label">Categoría</label>
                        <select class="form-control" id="categoria" name="categoria" required>
                            <option value="">Seleccionar categoría</option>
                            <option value="Mariscos">Mariscos</option>
                            <option value="Carnes">Carnes</option>
                            <option value="Sopas">Sopas</option>
                            <option value="Ensaladas">Ensaladas</option>
                            <option value="Postres">Postres</option>
                            <option value="Bebidas">Bebidas</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="descripcion" class="form-label">Descripción</label>
                        <textarea class="form-control" id="descripcion" name="descripcion" rows="3" placeholder="Describe los ingredientes y preparación del plato..."></textarea>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <button type="submit" class="btn btn-success">
                            Agregar Plato
                        </button>
                        <a href="/menu" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
