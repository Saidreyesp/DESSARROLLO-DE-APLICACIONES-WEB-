<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuevo Producto</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <h1>Sistema de Gestión de Inventario</h1>
    <nav>
      <ul>
        <li><a href="/">Dashboard</a></li>
        <li><a href="/productos">Productos</a></li>
        <li><a href="/producto/nuevo">Nuevo Producto</a></li>
      </ul>
    </nav>
  </header>

  <div class="container" style="max-width: 600px; margin: 50px auto;">
    <h2 style="color: #6A1E7A;">Agregar Nuevo Producto</h2>
    
    <form method="post" style="background: #F5F1E8; padding: 20px; border-radius: 8px; border: 1px solid #C9A227; color: #6A1E7A;">
      <div style="margin-bottom: 15px;">
        <label for="nombre" style="color: #6A1E7A; font-weight: 700;">Nombre del Producto:</label><br>
        <input type="text" id="nombre" name="nombre" required style="width: 100%; padding: 8px; color: #6A1E7A; border: 1px solid #C9A227; background: #fff;">
      </div>

      <div style="margin-bottom: 15px;">
        <label for="cantidad" style="color: #6A1E7A; font-weight: 700;">Cantidad:</label><br>
        <input type="number" id="cantidad" name="cantidad" min="0" required style="width: 100%; padding: 8px; color: #6A1E7A; border: 1px solid #C9A227; background: #fff;">
      </div>

      <div style="margin-bottom: 15px;">
        <label for="precio" style="color: #6A1E7A; font-weight: 700;">Precio Unitario:</label><br>
        <input type="number" id="precio" name="precio" min="0" step="0.01" required style="width: 100%; padding: 8px; color: #6A1E7A; border: 1px solid #C9A227; background: #fff;">
      </div>

      <div style="margin-bottom: 15px;">
        <label for="categoria" style="color: #6A1E7A; font-weight: 700;">Categoría:</label><br>
        <input type="text" id="categoria" name="categoria" style="width: 100%; padding: 8px; color: #6A1E7A; border: 1px solid #C9A227; background: #fff;">
      </div>

      <div style="margin-bottom: 15px;">
        <label for="descripcion" style="color: #6A1E7A; font-weight: 700;">Descripción:</label><br>
        <textarea id="descripcion" name="descripcion" rows="4" style="width: 100%; padding: 8px; color: #6A1E7A; border: 1px solid #C9A227; background: #fff;"></textarea>
      </div>

      <div style="margin-bottom: 15px;">
        <label for="imagen" style="color: #6A1E7A; font-weight: 700;">URL de la Imagen:</label><br>
        <input type="url" id="imagen" name="imagen" placeholder="https://ejemplo.com/imagen.jpg" style="width: 100%; padding: 8px; color: #6A1E7A; border: 1px solid #C9A227; background: #fff;">
        <small style="color: #6A1E7A;">Opcional: Ingresa la URL de una imagen del plato</small>
      </div>

      <button type="submit" style="background-color: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer;">
        Guardar Producto
      </button>
      <a href="/productos" style="margin-left: 10px; padding: 10px 20px; background-color: #6c757d; color: white; border-radius: 4px; text-decoration: none;">
        Cancelar
      </a>
    </form>
  </div>

  <footer>
    <p>&copy; 2026 Sistema de Inventario</p>
  </footer>
</body>
</html>
